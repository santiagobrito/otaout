name: Build and Deploy
on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=https://otaout.com
            NEXT_PUBLIC_SITE_NAME=OTAout

      - name: Deploy to EasyPanel
        env:
          EP_KEY: ${{ secrets.EASYPANEL_API_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EP="https://panel.baitcore.com/api/trpc"

          # Update image source with GHCR auth
          curl -sf -X POST \
            -H "Authorization: Bearer $EP_KEY" \
            -H "Content-Type: application/json" \
            "$EP/services.app.updateSourceImage" \
            -d "{\"json\":{\"projectName\":\"otaout\",\"serviceName\":\"web\",\"image\":\"ghcr.io/santiagobrito/otaout:latest\",\"username\":\"santiagobrito\",\"password\":\"$GHCR_TOKEN\"}}"

          # Deploy
          curl -sf -X POST \
            -H "Authorization: Bearer $EP_KEY" \
            -H "Content-Type: application/json" \
            "$EP/services.app.deployService" \
            -d '{"json":{"projectName":"otaout","serviceName":"web"}}'
