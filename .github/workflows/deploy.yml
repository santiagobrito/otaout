name: Build and Deploy
on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=https://otaout.com
            NEXT_PUBLIC_SITE_NAME=OTAout

      - name: Deploy to EasyPanel
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.EASYPANEL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://panel.baitcore.com/api/trpc/services.app.deployService" \
            -d '{"json":{"projectName":"otaout","serviceName":"web"}}'
